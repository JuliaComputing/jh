name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        # Full history is required for GoReleaser changelog generation.
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.24'

    - name: Determine GoReleaser args
      id: args
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          # Real release: publish to GitHub Releases.
          echo "value=release --clean" >> "$GITHUB_OUTPUT"
        else
          # Manual run on a branch (workflow_dispatch): dry-run build only,
          # no publishing. Mirrors the old "build but don't release" behavior.
          echo "value=release --clean --snapshot" >> "$GITHUB_OUTPUT"
        fi

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
      with:
        distribution: goreleaser
        version: '~> v2'
        args: ${{ steps.args.outputs.value }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload snapshot artifacts
      if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: jh-snapshot
        path: dist/jh-*
